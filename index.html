<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리의 레시피</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family: Arial; background:#f6f1eb; }
    .wrap { max-width:900px; margin:0 auto; padding:20px; }
    .btn { padding:12px; border-radius:10px; border:none; cursor:pointer; }
    .btn-primary { background:#ff8a00; color:white; }
    .card { background:white; padding:15px; border-radius:15px; margin-bottom:15px; }
    img { width:100%; border-radius:10px; }
  </style>
</head>

<body>
<div class="wrap">

<h1>우리의 레시피</h1>

<button class="btn btn-primary" onclick="openUpload()">레시피 올리기</button>

<div id="list"></div>

</div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);">
  <div style="background:white; padding:20px; margin:50px;">
    <input id="title" placeholder="제목"><br><br>
    <textarea id="summary" placeholder="설명"></textarea><br><br>

    <input type="file" id="image"><br><br>

    <div id="ingredients"></div>
    <button onclick="addIng()">+재료</button><br><br>

    <div id="steps"></div>
    <button onclick="addStep()">+순서</button><br><br>

    <button onclick="submit()">등록</button>
    <button onclick="closeUpload()">닫기</button>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://xfqvnpjkbfspuqmvgqnj.supabase.co",
  "sb_publishable_n_C4S5gwta5c6vARXaYZXw_tsKCTwnD"
);

function openUpload() {
  document.getElementById("modal").style.display="block";
}

function closeUpload() {
  document.getElementById("modal").style.display="none";
}

function addIng() {
  let d=document.createElement("input");
  d.placeholder="재료";
  document.getElementById("ingredients").appendChild(d);
}

function addStep() {
  let d=document.createElement("input");
  d.placeholder="순서";
  document.getElementById("steps").appendChild(d);
}

async function submit() {
  let title=document.getElementById("title").value;
  let summary=document.getElementById("summary").value;

  let file=document.getElementById("image").files[0];
  let fileName=Date.now()+file.name;

  await supabase.storage.from("recipe-images").upload(fileName,file);

  let url=supabase.storage.from("recipe-images").getPublicUrl(fileName).data.publicUrl;

  let {data}=await supabase.from("recipes").insert({
    title:title,
    summary:summary,
    image_url:url
  }).select().single();

  let id=data.id;

  let ings=[...document.querySelectorAll("#ingredients input")];
  for(let i=0;i<ings.length;i++){
    await supabase.from("recipe_ingredients").insert({
      recipe_id:id,
      content:ings[i].value
    });
  }

  let steps=[...document.querySelectorAll("#steps input")];
  for(let i=0;i<steps.length;i++){
    await supabase.from("recipe_steps").insert({
      recipe_id:id,
      content:steps[i].value
    });
  }

  location.reload();
}

async function load() {
  let {data}=await supabase.from("recipes").select("*").order("id",{ascending:false});

  let html="";
  data.forEach(r=>{
    html+=`
    <div class="card">
      <img src="${r.image_url}">
      <h3>${r.title}</h3>
      <p>${r.summary}</p>
    </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

load();
</script>

</body>
</html>
