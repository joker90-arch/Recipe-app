<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리의 레시피</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:#f6f1eb; color:#222; }
    .wrap { max-width:980px; margin:0 auto; padding:20px; }
    .hero,.card,.empty,.modal-box { background:#fff; border-radius:20px; box-shadow:0 8px 24px rgba(0,0,0,.06); }
    .hero { padding:20px; margin-bottom:18px; }
    h1 { margin:0 0 10px; font-size:32px; }
    .hero p { color:#666; line-height:1.6; }
    .btn { padding:12px 14px; border:0; border-radius:12px; cursor:pointer; font-weight:700; font-size:15px; }
    .btn-primary { background:#ff8a00; color:#fff; }
    .btn-secondary { background:#eee2d4; color:#5b4029; }
    .btn-danger { background:#d94b4b; color:#fff; }
    .auth-box,.tabs,.card-actions,.actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    .auth-box input { max-width:220px; }
    .tab-btn { padding:10px 14px; border:0; border-radius:999px; background:#fff; font-weight:700; cursor:pointer; }
    .tab-btn.active { background:#222; color:#fff; }
    .card { margin-bottom:16px; overflow:hidden; }
    .card img { width:100%; height:220px; object-fit:cover; display:block; background:#ebe5de; }
    .card-body { padding:16px; }
    .meta { font-size:14px; color:#666; margin-bottom:8px; }
    .badge { display:inline-block; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; margin-right:6px; }
    .badge.mine { background:#ffe7cc; color:#a35700; }
    .badge.saved { background:#e8f4ea; color:#24663c; }
    .empty { padding:24px; text-align:center; color:#777; }
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; padding:16px; z-index:9999; }
    .modal-bg.show { display:flex; }
    .modal-box { width:100%; max-width:720px; max-height:90vh; overflow-y:auto; padding:20px; }
    .field { margin-bottom:14px; }
    .field label { display:block; margin-bottom:8px; font-weight:700; }
    input,textarea { width:100%; padding:12px; border:1px solid #ddd; border-radius:12px; font-size:15px; font-family:inherit; }
    textarea { min-height:90px; resize:vertical; }
    .list-row { display:grid; grid-template-columns:1fr auto; gap:8px; margin-bottom:8px; }
    .preview { width:100%; max-height:260px; object-fit:cover; border-radius:14px; display:none; margin-top:10px; background:#ebe5de; }
    .preview.show { display:block; }
    .detail-block { background:#f8f3ee; border-radius:14px; padding:14px; margin-top:12px; }
    .detail-block ul,.detail-block ol { margin:0; padding-left:20px; line-height:1.8; }
    .error-box { margin-top:12px; background:#fff3f3; color:#a40000; border:1px solid #ffc8c8; padding:10px 12px; border-radius:12px; display:none; white-space:pre-wrap; font-size:13px; }
    .error-box.show { display:block; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>우리의 레시피</h1>
    <p>로그인한 사용자가 레시피를 올리고, 저장하고, 본인 글만 수정/삭제할 수 있는 공간</p>

    <button class="btn btn-primary" id="openCreateBtn">레시피 올리기</button>

    <div class="auth-box">
      <input id="authEmail" type="email" placeholder="이메일">
      <input id="authPassword" type="password" placeholder="비밀번호">
      <button class="btn btn-secondary" id="signUpBtn">회원가입</button>
      <button class="btn btn-secondary" id="signInBtn">로그인</button>
      <button class="btn btn-secondary" id="signOutBtn">로그아웃</button>
    </div>

    <div id="authStatus" style="margin-top:10px; color:#666; font-size:14px;">로그인 전</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-all" onclick="changeTab('all')">모두의 레시피</button>
    <button class="tab-btn" id="tab-mine" onclick="changeTab('mine')">내가 올린 레시피</button>
    <button class="tab-btn" id="tab-saved" onclick="changeTab('saved')">저장한 레시피</button>
    <button class="tab-btn" id="tab-latest" onclick="changeTab('latest')">최신 레시피</button>
  </div>

  <div id="list"></div>
</div>

<div class="modal-bg" id="createModal">
  <div class="modal-box">
    <h2>레시피 등록</h2>

    <div class="field">
      <label>작성자 이름</label>
      <input id="authorName" placeholder="예: Joker90">
    </div>

    <div class="field">
      <label>제목</label>
      <input id="title" placeholder="예: 참치김치볶음밥">
    </div>

    <div class="field">
      <label>설명</label>
      <textarea id="summary" placeholder="예: 빠르게 해먹기 좋은 메뉴"></textarea>
    </div>

    <div class="field">
      <label>완성 사진 1장</label>
      <input type="file" id="image" accept="image/*">
      <img id="preview" class="preview">
    </div>

    <div class="field">
      <label>재료</label>
      <div id="ingredients"></div>
      <button type="button" class="btn btn-secondary" id="addIngredientBtn">+ 재료 추가</button>
    </div>

    <div class="field">
      <label>요리 순서</label>
      <div id="steps"></div>
      <button type="button" class="btn btn-secondary" id="addStepBtn">+ 순서 추가</button>
    </div>

    <div id="createError" class="error-box"></div>

    <div class="actions">
      <button class="btn btn-primary" id="submitCreateBtn">등록</button>
      <button class="btn btn-secondary" id="closeCreateBtn">닫기</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="editModal">
  <div class="modal-box">
    <h2>레시피 수정</h2>

    <div class="field">
      <label>제목</label>
      <input id="editTitle">
    </div>

    <div class="field">
      <label>설명</label>
      <textarea id="editSummary"></textarea>
    </div>

    <div class="field">
      <label>새 완성 사진 선택</label>
      <input type="file" id="editImage" accept="image/*">
      <img id="editPreview" class="preview">
    </div>

    <div class="field">
      <label>재료</label>
      <div id="editIngredients"></div>
      <button type="button" class="btn btn-secondary" id="editAddIngredientBtn">+ 재료 추가</button>
    </div>

    <div class="field">
      <label>요리 순서</label>
      <div id="editSteps"></div>
      <button type="button" class="btn btn-secondary" id="editAddStepBtn">+ 순서 추가</button>
    </div>

    <div id="editError" class="error-box"></div>

    <div class="actions">
      <button class="btn btn-primary" id="submitEditBtn">수정 저장</button>
      <button class="btn btn-secondary" id="closeEditBtn">닫기</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="detailModal">
  <div class="modal-box">
    <h2 id="detailTitle"></h2>
    <div class="meta" id="detailMeta"></div>
    <img id="detailImage" class="preview">
    <div id="detailSummary" style="margin-top:12px; line-height:1.7;"></div>

    <div class="detail-block">
      <h4>재료</h4>
      <ul id="detailIngredients"></ul>
    </div>

    <div class="detail-block">
      <h4>요리 순서</h4>
      <ol id="detailSteps"></ol>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="closeDetailBtn">닫기</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://xfqvnpjkbfspuqmvgqnj.supabase.co";
const SUPABASE_KEY = "sb_publishable_n_C4S5gwta5c6vARXaYZXw_tsKCTwnD";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const state = {
  currentTab: "all",
  recipes: [],
  user: null,
  currentEditRecipeId: null
};

const listEl = document.getElementById("list");
const createModal = document.getElementById("createModal");
const editModal = document.getElementById("editModal");
const detailModal = document.getElementById("detailModal");

async function loadUser() {
  const { data } = await supabaseClient.auth.getUser();
  state.user = data.user || null;
}

function renderAuthStatus() {
  const statusEl = document.getElementById("authStatus");
  const emailEl = document.getElementById("authEmail");
  const passwordEl = document.getElementById("authPassword");
  const signUpBtn = document.getElementById("signUpBtn");
  const signInBtn = document.getElementById("signInBtn");
  const signOutBtn = document.getElementById("signOutBtn");

  if (state.user) {
    statusEl.textContent = `로그인됨: ${state.user.email}`;
    emailEl.style.display = "none";
    passwordEl.style.display = "none";
    signUpBtn.style.display = "none";
    signInBtn.style.display = "none";
    signOutBtn.style.display = "inline-block";
  } else {
    statusEl.textContent = "로그인 전";
    emailEl.style.display = "inline-block";
    passwordEl.style.display = "inline-block";
    signUpBtn.style.display = "inline-block";
    signInBtn.style.display = "inline-block";
    signOutBtn.style.display = "none";
  }
}

async function signUp() {
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPassword").value.trim();

  if (!email || !password) return alert("이메일과 비밀번호를 입력해 주세요.");

  const { error } = await supabaseClient.auth.signUp({ email, password });
  if (error) return alert(error.message);

  alert("회원가입 완료. 로그인해 주세요.");
}

async function signIn() {
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPassword").value.trim();

  if (!email || !password) return alert("이메일과 비밀번호를 입력해 주세요.");

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) return alert(error.message);

  await loadUser();
  renderAuthStatus();
  await loadRecipes();
}

async function signOut() {
  await supabaseClient.auth.signOut();
  state.user = null;
  renderAuthStatus();
  await loadRecipes();
}

function showModal(el) { el.classList.add("show"); }
function hideModal(el) { el.classList.remove("show"); }

function setError(id, msg) {
  const el = document.getElementById(id);
  if (!msg) {
    el.classList.remove("show");
    el.textContent = "";
    return;
  }
  el.classList.add("show");
  el.textContent = msg;
}

function escapeHtml(text) {
  return (text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function addField(containerId, value = "") {
  const row = document.createElement("div");
  row.className = "list-row";
  row.innerHTML = `
    <input type="text" value="${escapeHtml(value)}" placeholder="입력">
    <button type="button" class="btn btn-secondary">삭제</button>
  `;
  row.querySelector("button").onclick = () => row.remove();
  document.getElementById(containerId).appendChild(row);
}

function collectFieldValues(containerId) {
  return [...document.querySelectorAll(`#${containerId} input`)]
    .map(v => v.value.trim())
    .filter(Boolean);
}

function clearCreateForm() {
  document.getElementById("authorName").value = "";
  document.getElementById("title").value = "";
  document.getElementById("summary").value = "";
  document.getElementById("image").value = "";
  document.getElementById("preview").src = "";
  document.getElementById("preview").classList.remove("show");
  document.getElementById("ingredients").innerHTML = "";
  document.getElementById("steps").innerHTML = "";
  addField("ingredients");
  addField("steps");
  setError("createError", "");
}

async function uploadImage(file) {
  const safeName = `${Date.now()}_${Math.random().toString(36).slice(2)}_${file.name.replace(/[^a-zA-Z0-9._-]/g, "_")}`;

  const { error } = await supabaseClient
    .storage
    .from("recipe-images")
    .upload(safeName, file, {
      upsert: false,
      contentType: file.type || "image/jpeg"
    });

  if (error) throw error;

  const { data } = supabaseClient
    .storage
    .from("recipe-images")
    .getPublicUrl(safeName);

  return data.publicUrl;
}

async function loadRecipes() {
  const { data: recipes, error } = await supabaseClient
    .from("recipes")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    listEl.innerHTML = `<div class="empty">레시피를 불러오지 못했습니다.</div>`;
    return;
  }

  const ids = (recipes || []).map(r => r.id);
  const ingredientsMap = {};
  const stepsMap = {};
  const savedSet = new Set();

  if (ids.length) {
    const { data: ingredients } = await supabaseClient
      .from("recipe_ingredients")
      .select("*")
      .in("recipe_id", ids)
      .order("sort_order", { ascending: true });

    const { data: steps } = await supabaseClient
      .from("recipe_steps")
      .select("*")
      .in("recipe_id", ids)
      .order("sort_order", { ascending: true });

    (ingredients || []).forEach(v => {
      if (!ingredientsMap[v.recipe_id]) ingredientsMap[v.recipe_id] = [];
      ingredientsMap[v.recipe_id].push(v.content);
    });

    (steps || []).forEach(v => {
      if (!stepsMap[v.recipe_id]) stepsMap[v.recipe_id] = [];
      stepsMap[v.recipe_id].push(v.content);
    });

    if (state.user) {
      const { data: saves } = await supabaseClient
        .from("saved_recipes")
        .select("recipe_id")
        .eq("user_id", state.user.id);

      (saves || []).forEach(v => savedSet.add(v.recipe_id));
    }
  }

  state.recipes = (recipes || []).map(r => ({
    ...r,
    ingredients: ingredientsMap[r.id] || [],
    steps: stepsMap[r.id] || [],
    isSaved: savedSet.has(r.id),
    isMine: !!state.user && r.user_id === state.user.id
  }));

  renderRecipes();
}

function getFilteredRecipes() {
  if (state.currentTab === "mine") {
    return state.recipes.filter(r => r.isMine);
  }

  if (state.currentTab === "saved") {
    return state.recipes.filter(r => r.isSaved);
  }

  if (state.currentTab === "latest") {
    return [...state.recipes].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
  }

  return state.recipes;
}

function renderRecipes() {
  const data = getFilteredRecipes();

  if (!data.length) {
    let msg = "등록된 레시피가 없습니다.";
    if (state.currentTab === "mine") msg = "내가 올린 레시피가 없습니다.";
    if (state.currentTab === "saved") msg = "저장한 레시피가 없습니다.";
    listEl.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  listEl.innerHTML = data.map(r => `
    <div class="card">
      ${r.image_url ? `<img src="${r.image_url}" alt="">` : ""}
      <div class="card-body">
        ${r.isMine ? `<span class="badge mine">내 레시피</span>` : ""}
        ${r.isSaved ? `<span class="badge saved">저장됨</span>` : ""}
        <h3>${escapeHtml(r.title || "")}</h3>
        <div class="meta">작성자: ${escapeHtml(r.author_name || "익명")}</div>
        <p>${escapeHtml(r.summary || "")}</p>
        <div class="card-actions">
          <button class="btn ${r.isSaved ? "btn-primary" : "btn-secondary"}" data-action="save" data-id="${r.id}">
            ${r.isSaved ? "저장 해제" : "저장하기"}
          </button>
          <button class="btn btn-secondary" data-action="detail" data-id="${r.id}">자세히 보기</button>
          ${r.isMine ? `<button class="btn btn-secondary" data-action="edit" data-id="${r.id}">수정</button>` : ""}
          ${r.isMine ? `<button class="btn btn-danger" data-action="delete" data-id="${r.id}">삭제</button>` : ""}
          <button class="btn btn-danger" data-action="admin-delete" data-id="${r.id}">관리자 삭제</button>
        </div>
      </div>
    </div>
  `).join("");
}

function changeTab(tab) {
  state.currentTab = tab;
  ["all", "mine", "saved", "latest"].forEach(name => {
    document.getElementById(`tab-${name}`).classList.remove("active");
  });
  document.getElementById(`tab-${tab}`).classList.add("active");
  renderRecipes();
}

async function createRecipe() {
  try {
    setError("createError", "");

    if (!state.user) return setError("createError", "로그인 후 레시피를 올릴 수 있습니다.");

    const authorName = document.getElementById("authorName").value.trim() || state.user.email;
    const title = document.getElementById("title").value.trim();
    const summary = document.getElementById("summary").value.trim();
    const file = document.getElementById("image").files[0];
    const ingredients = collectFieldValues("ingredients");
    const steps = collectFieldValues("steps");

    if (!title) return setError("createError", "제목을 입력해 주세요.");
    if (!file) return setError("createError", "사진을 선택해 주세요.");
    if (!ingredients.length) return setError("createError", "재료를 입력해 주세요.");
    if (!steps.length) return setError("createError", "요리 순서를 입력해 주세요.");

    const imageUrl = await uploadImage(file);

    const { data: recipeRow, error: recipeError } = await supabaseClient
      .from("recipes")
      .insert({
        title,
        summary,
        image_url: imageUrl,
        author_name: authorName,
        user_id: state.user.id
      })
      .select()
      .single();

    if (recipeError) throw recipeError;

    const ingredientRows = ingredients.map((content, idx) => ({
      recipe_id: recipeRow.id,
      content,
      sort_order: idx + 1
    }));

    const stepRows = steps.map((content, idx) => ({
      recipe_id: recipeRow.id,
      content,
      sort_order: idx + 1
    }));

    const { error: ingError } = await supabaseClient.from("recipe_ingredients").insert(ingredientRows);
    if (ingError) throw ingError;

    const { error: stepError } = await supabaseClient.from("recipe_steps").insert(stepRows);
    if (stepError) throw stepError;

    hideModal(createModal);
    clearCreateForm();
    await loadRecipes();
  } catch (e) {
    setError("createError", "등록 중 오류가 발생했습니다.\n\n" + (e?.message || ""));
  }
}

async function toggleSave(recipeId) {
  if (!state.user) return alert("로그인 후 저장할 수 있습니다.");

  const recipe = state.recipes.find(r => r.id === recipeId);
  if (!recipe) return;

  if (recipe.isSaved) {
    await supabaseClient
      .from("saved_recipes")
      .delete()
      .eq("recipe_id", recipeId)
      .eq("user_id", state.user.id);
  } else {
    await supabaseClient
      .from("saved_recipes")
      .insert({
        recipe_id: recipeId,
        user_id: state.user.id
      });
  }

  await loadRecipes();
}

function openDetail(recipeId) {
  const recipe = state.recipes.find(r => r.id === recipeId);
  if (!recipe) return;

  document.getElementById("detailTitle").textContent = recipe.title || "";
  document.getElementById("detailMeta").textContent = `작성자: ${recipe.author_name || "익명"}`;
  document.getElementById("detailSummary").textContent = recipe.summary || "";

  const img = document.getElementById("detailImage");
  if (recipe.image_url) {
    img.src = recipe.image_url;
    img.classList.add("show");
  } else {
    img.src = "";
    img.classList.remove("show");
  }

  document.getElementById("detailIngredients").innerHTML =
    recipe.ingredients.map(v => `<li>${escapeHtml(v)}</li>`).join("");

  document.getElementById("detailSteps").innerHTML =
    recipe.steps.map(v => `<li>${escapeHtml(v)}</li>`).join("");

  showModal(detailModal);
}

function openEdit(recipeId) {
  const recipe = state.recipes.find(r => r.id === recipeId);
  if (!recipe || !recipe.isMine) return alert("수정 권한이 없습니다.");

  state.currentEditRecipeId = recipeId;

  document.getElementById("editTitle").value = recipe.title || "";
  document.getElementById("editSummary").value = recipe.summary || "";
  document.getElementById("editImage").value = "";

  const preview = document.getElementById("editPreview");
  if (recipe.image_url) {
    preview.src = recipe.image_url;
    preview.classList.add("show");
  } else {
    preview.src = "";
    preview.classList.remove("show");
  }

  document.getElementById("editIngredients").innerHTML = "";
  document.getElementById("editSteps").innerHTML = "";

  recipe.ingredients.forEach(v => addField("editIngredients", v));
  recipe.steps.forEach(v => addField("editSteps", v));

  if (!recipe.ingredients.length) addField("editIngredients");
  if (!recipe.steps.length) addField("editSteps");

  showModal(editModal);
}

async function saveEdit() {
  try {
    const recipe = state.recipes.find(r => r.id === state.currentEditRecipeId);
    if (!recipe || !recipe.isMine) return setError("editError", "수정 권한이 없습니다.");

    const title = document.getElementById("editTitle").value.trim();
    const summary = document.getElementById("editSummary").value.trim();
    const newFile = document.getElementById("editImage").files[0];
    const ingredients = collectFieldValues("editIngredients");
    const steps = collectFieldValues("editSteps");

    if (!title) return setError("editError", "제목을 입력해 주세요.");

    let imageUrl = recipe.image_url;
    if (newFile) imageUrl = await uploadImage(newFile);

    const { error: updateError } = await supabaseClient
      .from("recipes")
      .update({ title, summary, image_url: imageUrl })
      .eq("id", recipe.id)
      .eq("user_id", state.user.id);

    if (updateError) throw updateError;

    await supabaseClient.from("recipe_ingredients").delete().eq("recipe_id", recipe.id);
    await supabaseClient.from("recipe_steps").delete().eq("recipe_id", recipe.id);

    await supabaseClient.from("recipe_ingredients").insert(
      ingredients.map((content, idx) => ({ recipe_id: recipe.id, content, sort_order: idx + 1 }))
    );

    await supabaseClient.from("recipe_steps").insert(
      steps.map((content, idx) => ({ recipe_id: recipe.id, content, sort_order: idx + 1 }))
    );

    hideModal(editModal);
    await loadRecipes();
  } catch (e) {
    setError("editError", "수정 중 오류가 발생했습니다.\n\n" + (e?.message || ""));
  }
}

async function deleteMine(recipeId) {
  const recipe = state.recipes.find(r => r.id === recipeId);
  if (!recipe || !recipe.isMine) return alert("삭제 권한이 없습니다.");

  if (!confirm("이 레시피를 삭제할까요?")) return;

  const { error } = await supabaseClient
    .from("recipes")
    .delete()
    .eq("id", recipeId)
    .eq("user_id", state.user.id);

  if (error) return alert("삭제 오류: " + error.message);

  await loadRecipes();
}

async function adminDeleteRecipe(recipeId) {
  const token = prompt("관리자 삭제 비밀번호를 입력하세요");
  if (!token) return;

  if (!confirm("관리자 권한으로 삭제할까요?")) return;

  const res = await fetch("/api/admin-delete", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ recipeId, token })
  });

  const result = await res.json();

  if (!res.ok) return alert(result.error || "관리자 삭제 실패");

  alert("관리자 삭제 완료");
  await loadRecipes();
}

document.getElementById("openCreateBtn").addEventListener("click", () => {
  clearCreateForm();
  showModal(createModal);
});

document.getElementById("closeCreateBtn").addEventListener("click", () => hideModal(createModal));
document.getElementById("submitCreateBtn").addEventListener("click", createRecipe);
document.getElementById("closeEditBtn").addEventListener("click", () => hideModal(editModal));
document.getElementById("submitEditBtn").addEventListener("click", saveEdit);
document.getElementById("closeDetailBtn").addEventListener("click", () => hideModal(detailModal));

document.getElementById("addIngredientBtn").addEventListener("click", () => addField("ingredients"));
document.getElementById("addStepBtn").addEventListener("click", () => addField("steps"));
document.getElementById("editAddIngredientBtn").addEventListener("click", () => addField("editIngredients"));
document.getElementById("editAddStepBtn").addEventListener("click", () => addField("editSteps"));

document.getElementById("signUpBtn").addEventListener("click", signUp);
document.getElementById("signInBtn").addEventListener("click", signIn);
document.getElementById("signOutBtn").addEventListener("click", signOut);

document.getElementById("image").addEventListener("change", e => {
  const file = e.target.files[0];
  const preview = document.getElementById("preview");
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    preview.src = reader.result;
    preview.classList.add("show");
  };
  reader.readAsDataURL(file);
});

document.getElementById("editImage").addEventListener("change", e => {
  const file = e.target.files[0];
  const preview = document.getElementById("editPreview");
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    preview.src = reader.result;
    preview.classList.add("show");
  };
  reader.readAsDataURL(file);
});

listEl.addEventListener("click", async e => {
  const btn = e.target.closest("button[data-action]");
  if (!btn) return;

  const id = Number(btn.dataset.id);
  const action = btn.dataset.action;

  if (action === "save") await toggleSave(id);
  if (action === "detail") openDetail(id);
  if (action === "edit") openEdit(id);
  if (action === "delete") await deleteMine(id);
  if (action === "admin-delete") await adminDeleteRecipe(id);
});

window.changeTab = changeTab;

clearCreateForm();

loadUser().then(() => {
  renderAuthStatus();
  loadRecipes();
});
</script>
</body>
</html>
