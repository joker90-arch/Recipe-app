<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리의 레시피</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f1eb;
      color: #222;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }
    .hero {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }
    .hero p {
      margin: 0 0 16px;
      color: #666;
      line-height: 1.6;
    }
    .btn {
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
    }
    .btn-primary { background: #ff8a00; color: #fff; }
    .btn-secondary { background: #eee2d4; color: #5b4029; }
    .btn-danger { background: #d94b4b; color: #fff; }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tab-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      background: #fff;
      color: #333;
    }
    .tab-btn.active {
      background: #222;
      color: #fff;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #ebe5de;
    }
    .card-body { padding: 16px; }
    .card h3 { margin: 0 0 8px; }
    .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 6px;
      margin-bottom: 8px;
    }
    .badge.mine { background: #ffe7cc; color: #a35700; }
    .badge.saved { background: #e8f4ea; color: #24663c; }
    .card-actions, .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .empty {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      color: #777;
    }
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 9999;
    }
    .modal-box {
      background: #fff;
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    .list-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 8px;
    }
    .preview {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 14px;
      display: none;
      margin-top: 10px;
      background: #ebe5de;
    }
    .detail-block {
      background: #f8f3ee;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
    }
    .detail-block h4 {
      margin: 0 0 8px;
    }
    .detail-block ul, .detail-block ol {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
    }
    .review-item {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #eee;
    }
    .stars {
      color: #ff8a00;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .error-box {
      margin-top: 12px;
      background: #fff3f3;
      color: #a40000;
      border: 1px solid #ffc8c8;
      padding: 10px 12px;
      border-radius: 12px;
      display: none;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>우리의 레시피</h1>
      <p>내가 올린 레시피와 다른 사람의 레시피를 구분하고, 저장하고, 리뷰를 남기는 공간</p>
      <button class="btn btn-primary" id="openUploadBtn">레시피 올리기</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="all">모두의 레시피</button>
      <button class="tab-btn" data-tab="mine">내가 올린 레시피</button>
      <button class="tab-btn" data-tab="saved">저장한 레시피</button>
    </div>

    <div id="list"></div>
  </div>

  <!-- 등록 모달 -->
  <div class="modal-bg" id="modal">
    <div class="modal-box">
      <h2>레시피 등록</h2>

      <div class="field">
        <label for="authorName">작성자 이름</label>
        <input id="authorName" placeholder="예: Joker90" />
      </div>

      <div class="field">
        <label for="title">제목</label>
        <input id="title" placeholder="예: 참치김치볶음밥" />
      </div>

      <div class="field">
        <label for="summary">설명</label>
        <textarea id="summary" placeholder="예: 자취할 때 빠르게 해먹기 좋은 메뉴"></textarea>
      </div>

      <div class="field">
        <label for="image">완성 사진 1장</label>
        <input type="file" id="image" accept="image/*" />
        <img id="preview" class="preview" />
      </div>

      <div class="field">
        <label>재료</label>
        <div id="ingredients"></div>
        <button type="button" class="btn btn-secondary" id="addIngBtn">+ 재료 추가</button>
      </div>

      <div class="field">
        <label>요리 순서</label>
        <div id="steps"></div>
        <button type="button" class="btn btn-secondary" id="addStepBtn">+ 순서 추가</button>
      </div>

      <div id="uploadError" class="error-box"></div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="submitBtn">등록</button>
        <button type="button" class="btn btn-secondary" id="closeBtn">닫기</button>
      </div>
    </div>
  </div>

  <!-- 수정 모달 -->
  <div class="modal-bg" id="editModal">
    <div class="modal-box">
      <h2>레시피 수정</h2>

      <div class="field">
        <label for="editTitle">제목</label>
        <input id="editTitle" />
      </div>

      <div class="field">
        <label for="editSummary">설명</label>
        <textarea id="editSummary"></textarea>
      </div>

      <div class="field">
        <label for="editImage">새 완성 사진 (선택)</label>
        <input type="file" id="editImage" accept="image/*" />
        <img id="editPreview" class="preview" />
      </div>

      <div class="field">
        <label>재료</label>
        <div id="editIngredients"></div>
        <button type="button" class="btn btn-secondary" id="editAddIngBtn">+ 재료 추가</button>
      </div>

      <div class="field">
        <label>요리 순서</label>
        <div id="editSteps"></div>
        <button type="button" class="btn btn-secondary" id="editAddStepBtn">+ 순서 추가</button>
      </div>

      <div id="editError" class="error-box"></div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="saveEditBtn">수정 저장</button>
        <button type="button" class="btn btn-secondary" id="closeEditBtn">닫기</button>
      </div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div class="modal-bg" id="detailModal">
    <div class="modal-box">
      <h2 id="detailTitle"></h2>
      <div class="meta" id="detailMeta"></div>
      <img id="detailImage" class="preview" style="display:none; margin-top:0;" />
      <div id="detailSummary" style="margin-top:12px; line-height:1.7;"></div>

      <div class="detail-block">
        <h4>재료</h4>
        <ul id="detailIngredients"></ul>
      </div>

      <div class="detail-block">
        <h4>요리 순서</h4>
        <ol id="detailSteps"></ol>
      </div>

      <div class="detail-block">
        <h4>리뷰</h4>
        <div id="reviewList"></div>
      </div>

      <div class="detail-block">
        <h4>리뷰 남기기</h4>

        <div class="field">
          <label for="reviewAuthor">이름</label>
          <input id="reviewAuthor" placeholder="예: Joker90" />
        </div>

        <div class="field">
          <label for="reviewRating">별점</label>
          <select id="reviewRating">
            <option value="5">5점</option>
            <option value="4">4점</option>
            <option value="3">3점</option>
            <option value="2">2점</option>
            <option value="1">1점</option>
          </select>
        </div>

        <div class="field">
          <label for="reviewComment">후기</label>
          <textarea id="reviewComment" placeholder="예: 생각보다 간단하고 맛있었어요"></textarea>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-primary" id="submitReviewBtn">리뷰 등록</button>
          <button type="button" class="btn btn-secondary" id="closeDetailBtn">닫기</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://xfqvnpjkbfspuqmvgqnj.supabase.co",
      "sb_publishable_n_C4S5gwta5c6vARXaYZXw_tsKCTwnD"
    );

    const listEl = document.getElementById("list");
    const modal = document.getElementById("modal");
    const editModal = document.getElementById("editModal");
    const detailModal = document.getElementById("detailModal");
    const previewEl = document.getElementById("preview");
    const editPreviewEl = document.getElementById("editPreview");
    const tabButtons = document.querySelectorAll(".tab-btn");
    const uploadErrorEl = document.getElementById("uploadError");
    const editErrorEl = document.getElementById("editError");

    let currentTab = "all";
    let allRecipes = [];
    let currentDetailRecipeId = null;
    let currentEditRecipeId = null;

    function getOrCreateDeviceId() {
      let id = localStorage.getItem("our_recipe_device_id");
      if (!id) {
        id = "device_" + crypto.randomUUID();
        localStorage.setItem("our_recipe_device_id", id);
      }
      return id;
    }

    const deviceId = getOrCreateDeviceId();

    function getMyAuthorName() {
      return localStorage.getItem("our_recipe_author_name") || "";
    }

    function setUploadError(message) {
      uploadErrorEl.style.display = message ? "block" : "none";
      uploadErrorEl.textContent = message || "";
    }

    function setEditError(message) {
      editErrorEl.style.display = message ? "block" : "none";
      editErrorEl.textContent = message || "";
    }

    function escapeHtml(text) {
      return (text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function starText(n) {
      return "★".repeat(n) + "☆".repeat(5 - n);
    }

    function openUpload() {
      document.getElementById("authorName").value = getMyAuthorName();
      setUploadError("");
      modal.style.display = "flex";
    }

    function closeUpload() {
      modal.style.display = "none";
    }

    function closeEdit() {
      editModal.style.display = "none";
      currentEditRecipeId = null;
    }

    function closeDetail() {
      detailModal.style.display = "none";
      currentDetailRecipeId = null;
    }

    function addField(containerId, value = "") {
      const row = document.createElement("div");
      row.className = "list-row";
      row.innerHTML = `
        <input placeholder="입력" value="${escapeHtml(value)}">
        <button type="button" class="btn btn-secondary">삭제</button>
      `;
      row.querySelector("button").onclick = () => row.remove();
      document.getElementById(containerId).appendChild(row);
    }

    function addIng(value = "") { addField("ingredients", value); }
    function addStep(value = "") { addField("steps", value); }
    function addEditIng(value = "") { addField("editIngredients", value); }
    function addEditStep(value = "") { addField("editSteps", value); }

    document.getElementById("openUploadBtn").addEventListener("click", openUpload);
    document.getElementById("closeBtn").addEventListener("click", closeUpload);
    document.getElementById("closeEditBtn").addEventListener("click", closeEdit);
    document.getElementById("closeDetailBtn").addEventListener("click", closeDetail);
    document.getElementById("addIngBtn").addEventListener("click", () => addIng());
    document.getElementById("addStepBtn").addEventListener("click", () => addStep());
    document.getElementById("editAddIngBtn").addEventListener("click", () => addEditIng());
    document.getElementById("editAddStepBtn").addEventListener("click", () => addEditStep());

    document.getElementById("image").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function() {
        previewEl.src = reader.result;
        previewEl.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("editImage").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function() {
        editPreviewEl.src = reader.result;
        editPreviewEl.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    async function uploadImage(file) {
      const safeName = `${Date.now()}_${Math.random().toString(36).slice(2)}_${file.name.replace(/[^a-zA-Z0-9._-]/g, "_")}`;

      const { error: uploadError } = await supabaseClient
        .storage
        .from("recipe-images")
        .upload(safeName, file, {
          upsert: false,
          contentType: file.type || "image/jpeg"
        });

      if (uploadError) throw uploadError;

      const { data } = supabaseClient
        .storage
        .from("recipe-images")
        .getPublicUrl(safeName);

      return data.publicUrl;
    }

    async function submitRecipe() {
      try {
        setUploadError("");

        const authorName = document.getElementById("authorName").value.trim() || "익명";
        const title = document.getElementById("title").value.trim();
        const summary = document.getElementById("summary").value.trim();
        const file = document.getElementById("image").files[0];

        const ingredients = [...document.querySelectorAll("#ingredients input")]
          .map(v => v.value.trim()).filter(Boolean);

        const steps = [...document.querySelectorAll("#steps input")]
          .map(v => v.value.trim()).filter(Boolean);

        if (!title) return setUploadError("제목을 입력해 주세요.");
        if (!file) return setUploadError("사진을 선택해 주세요.");
        if (!ingredients.length) return setUploadError("재료를 1개 이상 입력해 주세요.");
        if (!steps.length) return setUploadError("요리 순서를 1개 이상 입력해 주세요.");

        localStorage.setItem("our_recipe_author_name", authorName);

        const imageUrl = await uploadImage(file);

        const { data: recipeRow, error: recipeError } = await supabaseClient
          .from("recipes")
          .insert({
            title,
            summary,
            image_url: imageUrl,
            author_name: authorName,
            owner_device_id: deviceId
          })
          .select()
          .single();

        if (recipeError) throw recipeError;

        const ingredientRows = ingredients.map((content, idx) => ({
          recipe_id: recipeRow.id,
          content,
          sort_order: idx + 1
        }));

        const stepRows = steps.map((content, idx) => ({
          recipe_id: recipeRow.id,
          content,
          sort_order: idx + 1
        }));

        const { error: ingError } = await supabaseClient.from("recipe_ingredients").insert(ingredientRows);
        if (ingError) throw ingError;

        const { error: stepError } = await supabaseClient.from("recipe_steps").insert(stepRows);
        if (stepError) throw stepError;

        alert("등록 완료");
        location.reload();
      } catch (e) {
        console.error(e);
        setUploadError(
          "등록 중 오류가 발생했습니다.\n\n" +
          (e?.message || "") +
          (e?.details ? "\n" + e.details : "")
        );
      }
    }

    async function openDetail(recipeId) {
      const recipe = allRecipes.find(r => r.id === recipeId);
      if (!recipe) return;

      currentDetailRecipeId = recipeId;

      document.getElementById("detailTitle").textContent = recipe.title || "";
      document.getElementById("detailMeta").textContent = `작성자: ${recipe.author_name || "익명"}`;
      document.getElementById("detailSummary").textContent = recipe.summary || "";
      document.getElementById("reviewAuthor").value = getMyAuthorName();
      document.getElementById("reviewRating").value = "5";
      document.getElementById("reviewComment").value = "";

      const detailImage = document.getElementById("detailImage");
      if (recipe.image_url) {
        detailImage.src = recipe.image_url;
        detailImage.style.display = "block";
      } else {
        detailImage.style.display = "none";
      }

      document.getElementById("detailIngredients").innerHTML =
        (recipe.ingredients || []).map(v => `<li>${escapeHtml(v)}</li>`).join("");

      document.getElementById("detailSteps").innerHTML =
        (recipe.steps || []).map(v => `<li>${escapeHtml(v)}</li>`).join("");

      await loadReviews(recipeId);
      detailModal.style.display = "flex";
    }

    async function submitReview() {
      try {
        if (!currentDetailRecipeId) return;

        const authorName = document.getElementById("reviewAuthor").value.trim() || "익명";
        const rating = parseInt(document.getElementById("reviewRating").value, 10);
        const comment = document.getElementById("reviewComment").value.trim();

        localStorage.setItem("our_recipe_author_name", authorName);

        const { error } = await supabaseClient
          .from("reviews")
          .insert({
            recipe_id: currentDetailRecipeId,
            author_name: authorName,
            rating,
            comment
          });

        if (error) throw error;

        document.getElementById("reviewComment").value = "";
        document.getElementById("reviewRating").value = "5";

        await loadReviews(currentDetailRecipeId);
        await loadRecipes();
      } catch (e) {
        console.error(e);
        alert("리뷰 등록 오류");
      }
    }

    async function loadReviews(recipeId) {
      const reviewListEl = document.getElementById("reviewList");

      const { data, error } = await supabaseClient
        .from("reviews")
        .select("*")
        .eq("recipe_id", recipeId)
        .order("created_at", { ascending: false });

      if (error) {
        reviewListEl.innerHTML = `<div class="review-item">리뷰를 불러오지 못했습니다.</div>`;
        return;
      }

      if (!data || !data.length) {
        reviewListEl.innerHTML = `<div class="review-item">아직 리뷰가 없습니다.</div>`;
        return;
      }

      reviewListEl.innerHTML = data.map(r => `
        <div class="review-item">
          <div class="stars">${starText(r.rating || 0)}</div>
          <div class="meta">작성자: ${escapeHtml(r.author_name || "익명")}</div>
          <div>${escapeHtml(r.comment || "")}</div>
        </div>
      `).join("");
    }

    async function toggleSave(recipeId) {
      const recipe = allRecipes.find(r => r.id === recipeId);
      if (!recipe) return;

      if (recipe.isSaved) {
        const { error } = await supabaseClient
          .from("saved_recipes")
          .delete()
          .eq("recipe_id", recipeId)
          .eq("device_id", deviceId);

        if (error) {
          console.error(error);
          alert("저장 해제 오류");
          return;
        }
      } else {
        const { error } = await supabaseClient
          .from("saved_recipes")
          .insert({
            recipe_id: recipeId,
            device_id: deviceId
          });

        if (error) {
          console.error(error);
          alert("저장 오류");
          return;
        }
      }

      await loadRecipes();
    }

    async function openEdit(recipeId) {
      const recipe = allRecipes.find(r => r.id === recipeId);
      if (!recipe || recipe.owner_device_id !== deviceId) {
        alert("수정 권한이 없습니다.");
        return;
      }

      currentEditRecipeId = recipeId;
      setEditError("");

      document.getElementById("editTitle").value = recipe.title || "";
      document.getElementById("editSummary").value = recipe.summary || "";
      document.getElementById("editImage").value = "";
      editPreviewEl.src = recipe.image_url || "";
      editPreviewEl.style.display = recipe.image_url ? "block" : "none";

      const ingBox = document.getElementById("editIngredients");
      const stepBox = document.getElementById("editSteps");
      ingBox.innerHTML = "";
      stepBox.innerHTML = "";

      (recipe.ingredients || []).forEach(v => addEditIng(v));
      (recipe.steps || []).forEach(v => addEditStep(v));

      if (!(recipe.ingredients || []).length) addEditIng();
      if (!(recipe.steps || []).length) addEditStep();

      editModal.style.display = "flex";
    }

    async function saveEdit() {
      try {
        if (!currentEditRecipeId) return;

        const recipe = allRecipes.find(r => r.id === currentEditRecipeId);
        if (!recipe || recipe.owner_device_id !== deviceId) {
          return setEditError("수정 권한이 없습니다.");
        }

        const title = document.getElementById("editTitle").value.trim();
        const summary = document.getElementById("editSummary").value.trim();
        const newFile = document.getElementById("editImage").files[0];

        const ingredients = [...document.querySelectorAll("#editIngredients input")]
          .map(v => v.value.trim()).filter(Boolean);

        const steps = [...document.querySelectorAll("#editSteps input")]
          .map(v => v.value.trim()).filter(Boolean);

        if (!title) return setEditError("제목을 입력해 주세요.");
        if (!ingredients.length) return setEditError("재료를 1개 이상 입력해 주세요.");
        if (!steps.length) return setEditError("요리 순서를 1개 이상 입력해 주세요.");

        let imageUrl = recipe.image_url;
        if (newFile) {
          imageUrl = await uploadImage(newFile);
        }

        const { error: updateError } = await supabaseClient
          .from("recipes")
          .update({
            title,
            summary,
            image_url: imageUrl
          })
          .eq("id", currentEditRecipeId);

        if (updateError) throw updateError;

        const { error: delIngError } = await supabaseClient
          .from("recipe_ingredients")
          .delete()
          .eq("recipe_id", currentEditRecipeId);

        if (delIngError) throw delIngError;

        const { error: delStepError } = await supabaseClient
          .from("recipe_steps")
          .delete()
          .eq("recipe_id", currentEditRecipeId);

        if (delStepError) throw delStepError;

        const ingredientRows = ingredients.map((content, idx) => ({
          recipe_id: currentEditRecipeId,
          content,
          sort_order: idx + 1
        }));

        const stepRows = steps.map((content, idx) => ({
          recipe_id: currentEditRecipeId,
          content,
          sort_order: idx + 1
        }));

        const { error: ingError } = await supabaseClient.from("recipe_ingredients").insert(ingredientRows);
        if (ingError) throw ingError;

        const { error: stepError } = await supabaseClient.from("recipe_steps").insert(stepRows);
        if (stepError) throw stepError;

        alert("수정 완료");
        closeEdit();
        await loadRecipes();
      } catch (e) {
        console.error(e);
        setEditError("수정 중 오류가 발생했습니다.\n\n" + (e?.message || ""));
      }
    }

    async function deleteRecipe(recipeId) {
      const recipe = allRecipes.find(r => r.id === recipeId);
      if (!recipe || recipe.owner_device_id !== deviceId) {
        alert("삭제 권한이 없습니다.");
        return;
      }

      const ok = confirm("이 레시피를 삭제할까요?");
      if (!ok) return;

      try {
        await supabaseClient.from("saved_recipes").delete().eq("recipe_id", recipeId);
        await supabaseClient.from("reviews").delete().eq("recipe_id", recipeId);
        await supabaseClient.from("recipe_ingredients").delete().eq("recipe_id", recipeId);
        await supabaseClient.from("recipe_steps").delete().eq("recipe_id", recipeId);

        const { error } = await supabaseClient
          .from("recipes")
          .delete()
          .eq("id", recipeId);

        if (error) throw error;

        alert("삭제 완료");
        await loadRecipes();
      } catch (e) {
        console.error(e);
        alert("삭제 중 오류가 발생했습니다.");
      }
    }

    function filterRecipes() {
      if (currentTab === "mine") {
        return allRecipes.filter(r => r.owner_device_id === deviceId);
      }
      if (currentTab === "saved") {
        return allRecipes.filter(r => r.isSaved);
      }
      return allRecipes;
    }

    function renderRecipes() {
      const data = filterRecipes();

      if (!data.length) {
        let message = "등록된 레시피가 없습니다.";
        if (currentTab === "mine") message = "내가 올린 레시피가 없습니다.";
        if (currentTab === "saved") message = "저장한 레시피가 없습니다.";
        listEl.innerHTML = `<div class="empty">${message}</div>`;
        return;
      }

      listEl.innerHTML = data.map(r => `
        <div class="card">
          ${r.image_url ? `<img src="${r.image_url}" alt="">` : ""}
          <div class="card-body">
            ${r.owner_device_id === deviceId ? `<span class="badge mine">내 레시피</span>` : ``}
            ${r.isSaved ? `<span class="badge saved">저장됨</span>` : ``}
            <h3>${escapeHtml(r.title || "")}</h3>
            <div class="meta">작성자: ${escapeHtml(r.author_name || "익명")} · 평균 별점 ${Number(r.avg_rating || 0).toFixed(1)}</div>
            <p>${escapeHtml(r.summary || "")}</p>
            <div class="card-actions">
              <button class="btn ${r.isSaved ? "btn-primary" : "btn-secondary"}" onclick="toggleSave(${r.id})">
                ${r.isSaved ? "저장 해제" : "저장하기"}
              </button>
              <button class="btn btn-secondary" onclick="openDetail(${r.id})">자세히 보기</button>
              ${r.owner_device_id === deviceId ? `<button class="btn btn-secondary" onclick="openEdit(${r.id})">수정</button>` : ``}
              ${r.owner_device_id === deviceId ? `<button class="btn btn-danger" onclick="deleteRecipe(${r.id})">삭제</button>` : ``}
            </div>
          </div>
        </div>
      `).join("");
    }

    async function loadRecipes() {
      const { data: recipes, error } = await supabaseClient
        .from("recipes")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        listEl.innerHTML = `<div class="empty">레시피를 불러오지 못했습니다.</div>`;
        return;
      }

      const recipeIds = (recipes || []).map(r => r.id);

      let ingredientsMap = {};
      let stepsMap = {};
      let savedIds = new Set();
      let reviewMap = {};
      let avgMap = {};

      if (recipeIds.length) {
        const { data: ingredients } = await supabaseClient
          .from("recipe_ingredients")
          .select("*")
          .in("recipe_id", recipeIds)
          .order("sort_order", { ascending: true });

        const { data: steps } = await supabaseClient
          .from("recipe_steps")
          .select("*")
          .in("recipe_id", recipeIds)
          .order("sort_order", { ascending: true });

        const { data: saves } = await supabaseClient
          .from("saved_recipes")
          .select("recipe_id")
          .eq("device_id", deviceId);

        const { data: reviews } = await supabaseClient
          .from("reviews")
          .select("recipe_id, rating")
          .in("recipe_id", recipeIds);

        (ingredients || []).forEach(item => {
          if (!ingredientsMap[item.recipe_id]) ingredientsMap[item.recipe_id] = [];
          ingredientsMap[item.recipe_id].push(item.content);
        });

        (steps || []).forEach(item => {
          if (!stepsMap[item.recipe_id]) stepsMap[item.recipe_id] = [];
          stepsMap[item.recipe_id].push(item.content);
        });

        savedIds = new Set((saves || []).map(v => v.recipe_id));

        (reviews || []).forEach(item => {
          if (!reviewMap[item.recipe_id]) reviewMap[item.recipe_id] = [];
          reviewMap[item.recipe_id].push(Number(item.rating || 0));
        });

        Object.keys(reviewMap).forEach(key => {
          const arr = reviewMap[key];
          avgMap[key] = arr.reduce((a, b) => a + b, 0) / arr.length;
        });
      }

      allRecipes = (recipes || []).map(r => ({
        ...r,
        ingredients: ingredientsMap[r.id] || [],
        steps: stepsMap[r.id] || [],
        isSaved: savedIds.has(r.id),
        avg_rating: avgMap[r.id] || 0
      }));

      renderRecipes();
    }

    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        currentTab = btn.dataset.tab;
        tabButtons.forEach(v => v.classList.remove("active"));
        btn.classList.add("active");
        renderRecipes();
      });
    });

    document.getElementById("submitBtn").addEventListener("click", submitRecipe);
    document.getElementById("submitReviewBtn").addEventListener("click", submitReview);
    document.getElementById("saveEditBtn").addEventListener("click", saveEdit);

    window.toggleSave = toggleSave;
    window.openDetail = openDetail;
    window.openEdit = openEdit;
    window.deleteRecipe = deleteRecipe;

    addIng();
    addStep();
    loadRecipes();
  </script>
</body>
</html>
