<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리의 레시피</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f1eb;
      color: #222;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }
    .hero {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }
    .hero p {
      margin: 0 0 16px;
      color: #666;
      line-height: 1.6;
    }
    .btn {
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
    }
    .btn-primary { background: #ff8a00; color: #fff; }
    .btn-secondary { background: #eee2d4; color: #5b4029; }
    .btn-danger { background: #d94b4b; color: #fff; }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tab-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      background: #fff;
      color: #333;
    }
    .tab-btn.active {
      background: #222;
      color: #fff;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #ebe5de;
    }
    .card-body {
      padding: 16px;
    }
    .card h3 {
      margin: 0 0 8px;
      line-height: 1.4;
    }
    .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 6px;
      margin-bottom: 8px;
    }
    .badge.mine { background: #ffe7cc; color: #a35700; }
    .badge.saved { background: #e8f4ea; color: #24663c; }

    .card-actions,
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .empty {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      color: #777;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 9999;
    }
    .modal-bg.show {
      display: flex;
    }
    .modal-box {
      background: #fff;
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    .list-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .preview {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 14px;
      display: none;
      margin-top: 10px;
      background: #ebe5de;
    }
    .preview.show {
      display: block;
    }

    .detail-block {
      background: #f8f3ee;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
    }
    .detail-block h4 {
      margin: 0 0 8px;
    }
    .detail-block ul,
    .detail-block ol {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
    }

    .review-item {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #eee;
    }
    .stars {
      color: #ff8a00;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .error-box {
      margin-top: 12px;
      background: #fff3f3;
      color: #a40000;
      border: 1px solid #ffc8c8;
      padding: 10px 12px;
      border-radius: 12px;
      display: none;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.5;
    }
    .error-box.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>우리의 레시피</h1>
      <p>내가 올린 레시피와 다른 사람의 레시피를 구분하고, 저장하고, 리뷰를 남기는 공간</p>
      <button class="btn btn-primary" id="openCreateBtn">레시피 올리기</button>
    </div>

    <div class="tabs">
  <button class="tab-btn active" id="tab-all" onclick="changeTab('all')">모두의 레시피</button>
  <button class="tab-btn" id="tab-mine" onclick="changeTab('mine')">내가 올린 레시피</button>
  <button class="tab-btn" id="tab-saved" onclick="changeTab('saved')">저장한 레시피</button>
</div>

    <div id="list"></div>
  </div>

  <!-- 생성 모달 -->
  <div class="modal-bg" id="createModal">
    <div class="modal-box">
      <h2>레시피 등록</h2>

      <div class="field">
        <label for="authorName">작성자 이름</label>
        <input id="authorName" placeholder="예: Joker90" />
      </div>

      <div class="field">
        <label for="title">제목</label>
        <input id="title" placeholder="예: 참치김치볶음밥" />
      </div>

      <div class="field">
        <label for="summary">설명</label>
        <textarea id="summary" placeholder="예: 자취할 때 빠르게 해먹기 좋은 메뉴"></textarea>
      </div>

      <div class="field">
        <label for="image">완성 사진 1장</label>
        <input type="file" id="image" accept="image/*" />
        <img id="preview" class="preview" />
      </div>

      <div class="field">
        <label>재료</label>
        <div id="ingredients"></div>
        <button type="button" class="btn btn-secondary" id="addIngredientBtn">+ 재료 추가</button>
      </div>

      <div class="field">
        <label>요리 순서</label>
        <div id="steps"></div>
        <button type="button" class="btn btn-secondary" id="addStepBtn">+ 순서 추가</button>
      </div>

      <div id="createError" class="error-box"></div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="submitCreateBtn">등록</button>
        <button type="button" class="btn btn-secondary" id="closeCreateBtn">닫기</button>
      </div>
    </div>
  </div>

  <!-- 수정 모달 -->
  <div class="modal-bg" id="editModal">
    <div class="modal-box">
      <h2>레시피 수정</h2>

      <div class="field">
        <label for="editTitle">제목</label>
        <input id="editTitle" />
      </div>

      <div class="field">
        <label for="editSummary">설명</label>
        <textarea id="editSummary"></textarea>
      </div>

      <div class="field">
        <label for="editImage">새 완성 사진 (선택)</label>
        <input type="file" id="editImage" accept="image/*" />
        <img id="editPreview" class="preview" />
      </div>

      <div class="field">
        <label>재료</label>
        <div id="editIngredients"></div>
        <button type="button" class="btn btn-secondary" id="editAddIngredientBtn">+ 재료 추가</button>
      </div>

      <div class="field">
        <label>요리 순서</label>
        <div id="editSteps"></div>
        <button type="button" class="btn btn-secondary" id="editAddStepBtn">+ 순서 추가</button>
      </div>

      <div id="editError" class="error-box"></div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="submitEditBtn">수정 저장</button>
        <button type="button" class="btn btn-secondary" id="closeEditBtn">닫기</button>
      </div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div class="modal-bg" id="detailModal">
    <div class="modal-box">
      <h2 id="detailTitle"></h2>
      <div class="meta" id="detailMeta"></div>
      <img id="detailImage" class="preview" />
      <div id="detailSummary" style="margin-top:12px; line-height:1.7;"></div>

      <div class="detail-block">
        <h4>재료</h4>
        <ul id="detailIngredients"></ul>
      </div>

      <div class="detail-block">
        <h4>요리 순서</h4>
        <ol id="detailSteps"></ol>
      </div>

      <div class="detail-block">
        <h4>리뷰</h4>
        <div id="reviewList"></div>
      </div>

      <div class="detail-block">
        <h4>리뷰 남기기</h4>

        <div class="field">
          <label for="reviewAuthor">이름</label>
          <input id="reviewAuthor" placeholder="예: Joker90" />
        </div>

        <div class="field">
          <label for="reviewRating">별점</label>
          <select id="reviewRating">
            <option value="5">5점</option>
            <option value="4">4점</option>
            <option value="3">3점</option>
            <option value="2">2점</option>
            <option value="1">1점</option>
          </select>
        </div>

        <div class="field">
          <label for="reviewComment">후기</label>
          <textarea id="reviewComment" placeholder="예: 생각보다 간단하고 맛있었어요"></textarea>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-primary" id="submitReviewBtn">리뷰 등록</button>
          <button type="button" class="btn btn-secondary" id="closeDetailBtn">닫기</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xfqvnpjkbfspuqmvgqnj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_n_C4S5gwta5c6vARXaYZXw_tsKCTwnD";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const state = {
      currentTab: "all",
      recipes: [],
      currentDetailRecipeId: null,
      currentEditRecipeId: null
    };

    const createModal = document.getElementById("createModal");
    const editModal = document.getElementById("editModal");
    const detailModal = document.getElementById("detailModal");
    const listEl = document.getElementById("list");

    function getDeviceId() {
      let id = localStorage.getItem("our_recipe_device_id");
      if (!id) {
        id = "device_" + crypto.randomUUID();
        localStorage.setItem("our_recipe_device_id", id);
      }
      return id;
    }

    const deviceId = getDeviceId();

    function getMyAuthorName() {
      return localStorage.getItem("our_recipe_author_name") || "";
    }

    function setMyAuthorName(name) {
      localStorage.setItem("our_recipe_author_name", name);
    }

    function showModal(el) {
      el.classList.add("show");
    }

    function hideModal(el) {
      el.classList.remove("show");
    }

    function escapeHtml(text) {
      return (text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function starText(n) {
      const num = Number(n || 0);
      return "★".repeat(num) + "☆".repeat(5 - num);
    }

    function setError(id, message) {
      const el = document.getElementById(id);
      if (!message) {
        el.classList.remove("show");
        el.textContent = "";
        return;
      }
      el.classList.add("show");
      el.textContent = message;
    }

    function clearCreateForm() {
      document.getElementById("authorName").value = getMyAuthorName();
      document.getElementById("title").value = "";
      document.getElementById("summary").value = "";
      document.getElementById("image").value = "";
      const preview = document.getElementById("preview");
      preview.src = "";
      preview.classList.remove("show");
      document.getElementById("ingredients").innerHTML = "";
      document.getElementById("steps").innerHTML = "";
      addDynamicField("ingredients");
      addDynamicField("steps");
      setError("createError", "");
    }

    function addDynamicField(containerId, value = "") {
      const row = document.createElement("div");
      row.className = "list-row";
      row.innerHTML = `
        <input type="text" value="${escapeHtml(value)}" placeholder="입력" />
        <button type="button" class="btn btn-secondary">삭제</button>
      `;
      row.querySelector("button").addEventListener("click", () => row.remove());
      document.getElementById(containerId).appendChild(row);
    }

    function collectFieldValues(containerId) {
      return [...document.querySelectorAll(`#${containerId} input`)]
        .map(v => v.value.trim())
        .filter(Boolean);
    }

    async function uploadImage(file) {
      const safeName = `${Date.now()}_${Math.random().toString(36).slice(2)}_${file.name.replace(/[^a-zA-Z0-9._-]/g, "_")}`;

      const { error } = await supabaseClient
        .storage
        .from("recipe-images")
        .upload(safeName, file, {
          upsert: false,
          contentType: file.type || "image/jpeg"
        });

      if (error) throw error;

      const { data } = supabaseClient
        .storage
        .from("recipe-images")
        .getPublicUrl(safeName);

      return data.publicUrl;
    }

    function getRecipeById(id) {
      return state.recipes.find(r => r.id === id);
    }

    async function loadRecipes() {
      const { data: recipes, error } = await supabaseClient
        .from("recipes")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        listEl.innerHTML = `<div class="empty">레시피를 불러오지 못했습니다.</div>`;
        return;
      }

      const ids = (recipes || []).map(r => r.id);

      const ingredientsMap = {};
      const stepsMap = {};
      const savedSet = new Set();
      const ratingMap = {};

      if (ids.length) {
        const { data: ingredients } = await supabaseClient
          .from("recipe_ingredients")
          .select("*")
          .in("recipe_id", ids)
          .order("sort_order", { ascending: true });

        const { data: steps } = await supabaseClient
          .from("recipe_steps")
          .select("*")
          .in("recipe_id", ids)
          .order("sort_order", { ascending: true });

        const { data: saves } = await supabaseClient
          .from("saved_recipes")
          .select("recipe_id")
          .eq("device_id", deviceId);

        const { data: reviews } = await supabaseClient
          .from("reviews")
          .select("recipe_id, rating")
          .in("recipe_id", ids);

        (ingredients || []).forEach(v => {
          if (!ingredientsMap[v.recipe_id]) ingredientsMap[v.recipe_id] = [];
          ingredientsMap[v.recipe_id].push(v.content);
        });

        (steps || []).forEach(v => {
          if (!stepsMap[v.recipe_id]) stepsMap[v.recipe_id] = [];
          stepsMap[v.recipe_id].push(v.content);
        });

        (saves || []).forEach(v => savedSet.add(v.recipe_id));

        (reviews || []).forEach(v => {
          if (!ratingMap[v.recipe_id]) ratingMap[v.recipe_id] = [];
          ratingMap[v.recipe_id].push(Number(v.rating || 0));
        });
      }

      state.recipes = (recipes || []).map(r => {
        const ratingArr = ratingMap[r.id] || [];
        const avg = ratingArr.length
          ? ratingArr.reduce((a, b) => a + b, 0) / ratingArr.length
          : 0;

        return {
          ...r,
          ingredients: ingredientsMap[r.id] || [],
          steps: stepsMap[r.id] || [],
          isSaved: savedSet.has(r.id),
          isMine: r.owner_device_id === deviceId,
          avgRating: avg
        };
      });

      renderRecipes();
    }

    function getFilteredRecipes() {
      if (state.currentTab === "mine") {
        return state.recipes.filter(r => r.owner_device_id === deviceId);
      }
      if (state.currentTab === "saved") {
        return state.recipes.filter(r => r.isSaved);
      }
      return state.recipes;
    }

    function renderRecipes() {
      const data = getFilteredRecipes();

      if (!data.length) {
        let message = "등록된 레시피가 없습니다.";
        if (state.currentTab === "mine") message = "내가 올린 레시피가 없습니다.";
        if (state.currentTab === "saved") message = "저장한 레시피가 없습니다.";
        listEl.innerHTML = `<div class="empty">${message}</div>`;
        return;
      }

      listEl.innerHTML = data.map(r => `
        <div class="card">
          ${r.image_url ? `<img src="${r.image_url}" alt="">` : ""}
          <div class="card-body">
            ${r.isMine ? `<span class="badge mine">내 레시피</span>` : ""}
            ${r.isSaved ? `<span class="badge saved">저장됨</span>` : ""}
            <h3>${escapeHtml(r.title || "")}</h3>
            <div class="meta">작성자: ${escapeHtml(r.author_name || "익명")} · 평균 별점 ${Number(r.avgRating || 0).toFixed(1)}</div>
            <p>${escapeHtml(r.summary || "")}</p>
            <div class="card-actions">
              <button class="btn ${r.isSaved ? "btn-primary" : "btn-secondary"}" data-action="save" data-id="${r.id}">
                ${r.isSaved ? "저장 해제" : "저장하기"}
              </button>
              <button class="btn btn-secondary" data-action="detail" data-id="${r.id}">자세히 보기</button>
              ${r.isMine ? `<button class="btn btn-secondary" data-action="edit" data-id="${r.id}">수정</button>` : ""}
              ${r.isMine ? `<button class="btn btn-danger" data-action="delete" data-id="${r.id}">삭제</button>` : ""}
              <button class="btn btn-danger" data-action="admin-delete" data-id="${r.id}">관리자 삭제</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function toggleSave(recipeId) {
      const recipe = getRecipeById(recipeId);
      if (!recipe) return;

      if (recipe.isSaved) {
        const { error } = await supabaseClient
          .from("saved_recipes")
          .delete()
          .eq("recipe_id", recipeId)
          .eq("device_id", deviceId);

        if (error) {
          alert("저장 해제 오류");
          return;
        }
      } else {
        const { error } = await supabaseClient
          .from("saved_recipes")
          .insert({
            recipe_id: recipeId,
            device_id: deviceId
          });

        if (error) {
          alert("저장 오류");
          return;
        }
      }

      await loadRecipes();
    }

    async function openDetail(recipeId) {
      const recipe = getRecipeById(recipeId);
      if (!recipe) return;

      state.currentDetailRecipeId = recipeId;

      document.getElementById("detailTitle").textContent = recipe.title || "";
      document.getElementById("detailMeta").textContent = `작성자: ${recipe.author_name || "익명"}`;
      document.getElementById("detailSummary").textContent = recipe.summary || "";

      const img = document.getElementById("detailImage");
      if (recipe.image_url) {
        img.src = recipe.image_url;
        img.classList.add("show");
      } else {
        img.src = "";
        img.classList.remove("show");
      }

      document.getElementById("detailIngredients").innerHTML =
        (recipe.ingredients || []).map(v => `<li>${escapeHtml(v)}</li>`).join("");

      document.getElementById("detailSteps").innerHTML =
        (recipe.steps || []).map(v => `<li>${escapeHtml(v)}</li>`).join("");

      document.getElementById("reviewAuthor").value = getMyAuthorName();
      document.getElementById("reviewRating").value = "5";
      document.getElementById("reviewComment").value = "";

      await loadReviews(recipeId);
      showModal(detailModal);
    }

    async function loadReviews(recipeId) {
      const box = document.getElementById("reviewList");
      const { data, error } = await supabaseClient
        .from("reviews")
        .select("*")
        .eq("recipe_id", recipeId)
        .order("created_at", { ascending: false });

      if (error) {
        box.innerHTML = `<div class="review-item">리뷰를 불러오지 못했습니다.</div>`;
        return;
      }

      if (!data || !data.length) {
        box.innerHTML = `<div class="review-item">아직 리뷰가 없습니다.</div>`;
        return;
      }

      box.innerHTML = data.map(r => `
        <div class="review-item">
          <div class="stars">${starText(r.rating || 0)}</div>
          <div class="meta">작성자: ${escapeHtml(r.author_name || "익명")}</div>
          <div>${escapeHtml(r.comment || "")}</div>
        </div>
      `).join("");
    }

    async function submitReview() {
      try {
        if (!state.currentDetailRecipeId) return;

        const authorName = document.getElementById("reviewAuthor").value.trim() || "익명";
        const rating = parseInt(document.getElementById("reviewRating").value, 10);
        const comment = document.getElementById("reviewComment").value.trim();

        setMyAuthorName(authorName);

        const { error } = await supabaseClient
          .from("reviews")
          .insert({
            recipe_id: state.currentDetailRecipeId,
            author_name: authorName,
            rating,
            comment
          });

        if (error) throw error;

        document.getElementById("reviewComment").value = "";
        document.getElementById("reviewRating").value = "5";

        await loadReviews(state.currentDetailRecipeId);
        await loadRecipes();
      } catch (e) {
        console.error(e);
        alert("리뷰 등록 오류");
      }
    }

    async function createRecipe() {
      try {
        setError("createError", "");

        const authorName = document.getElementById("authorName").value.trim() || "익명";
        const title = document.getElementById("title").value.trim();
        const summary = document.getElementById("summary").value.trim();
        const file = document.getElementById("image").files[0];
        const ingredients = collectFieldValues("ingredients");
        const steps = collectFieldValues("steps");

        if (!title) return setError("createError", "제목을 입력해 주세요.");
        if (!file) return setError("createError", "사진을 선택해 주세요.");
        if (!ingredients.length) return setError("createError", "재료를 1개 이상 입력해 주세요.");
        if (!steps.length) return setError("createError", "요리 순서를 1개 이상 입력해 주세요.");

        setMyAuthorName(authorName);

        const imageUrl = await uploadImage(file);

        const { data: recipeRow, error: recipeError } = await supabaseClient
          .from("recipes")
          .insert({
            title,
            summary,
            image_url: imageUrl,
            author_name: authorName,
            owner_device_id: deviceId
          })
          .select()
          .single();

        if (recipeError) throw recipeError;

        const ingredientRows = ingredients.map((content, idx) => ({
          recipe_id: recipeRow.id,
          content,
          sort_order: idx + 1
        }));

        const stepRows = steps.map((content, idx) => ({
          recipe_id: recipeRow.id,
          content,
          sort_order: idx + 1
        }));

        const { error: ingError } = await supabaseClient.from("recipe_ingredients").insert(ingredientRows);
        if (ingError) throw ingError;

        const { error: stepError } = await supabaseClient.from("recipe_steps").insert(stepRows);
        if (stepError) throw stepError;

        hideModal(createModal);
        clearCreateForm();
        await loadRecipes();
      } catch (e) {
        console.error(e);
        setError("createError", "등록 중 오류가 발생했습니다.\n\n" + (e?.message || ""));
      }
    }

    function openEdit(recipeId) {
      const recipe = getRecipeById(recipeId);
      if (!recipe || recipe.owner_device_id !== deviceId) {
        alert("수정 권한이 없습니다.");
        return;
      }

      state.currentEditRecipeId = recipeId;
      setError("editError", "");

      document.getElementById("editTitle").value = recipe.title || "";
      document.getElementById("editSummary").value = recipe.summary || "";

      document.getElementById("editImage").value = "";
      const preview = document.getElementById("editPreview");
      if (recipe.image_url) {
        preview.src = recipe.image_url;
        preview.classList.add("show");
      } else {
        preview.src = "";
        preview.classList.remove("show");
      }

      document.getElementById("editIngredients").innerHTML = "";
      document.getElementById("editSteps").innerHTML = "";

      (recipe.ingredients || []).forEach(v => addDynamicField("editIngredients", v));
      (recipe.steps || []).forEach(v => addDynamicField("editSteps", v));

      if (!(recipe.ingredients || []).length) addDynamicField("editIngredients");
      if (!(recipe.steps || []).length) addDynamicField("editSteps");

      showModal(editModal);
    }

    async function saveEdit() {
      try {
        setError("editError", "");

        const recipe = getRecipeById(state.currentEditRecipeId);
        if (!recipe || recipe.owner_device_id !== deviceId) {
          return setError("editError", "수정 권한이 없습니다.");
        }

        const title = document.getElementById("editTitle").value.trim();
        const summary = document.getElementById("editSummary").value.trim();
        const newFile = document.getElementById("editImage").files[0];
        const ingredients = collectFieldValues("editIngredients");
        const steps = collectFieldValues("editSteps");

        if (!title) return setError("editError", "제목을 입력해 주세요.");
        if (!ingredients.length) return setError("editError", "재료를 1개 이상 입력해 주세요.");
        if (!steps.length) return setError("editError", "요리 순서를 1개 이상 입력해 주세요.");

        let imageUrl = recipe.image_url;
        if (newFile) {
          imageUrl = await uploadImage(newFile);
        }

        const { error: updateError } = await supabaseClient
          .from("recipes")
          .update({
            title,
            summary,
            image_url: imageUrl
          })
          .eq("id", recipe.id)
          .eq("owner_device_id", deviceId);

        if (updateError) throw updateError;

        const { error: delIngError } = await supabaseClient
          .from("recipe_ingredients")
          .delete()
          .eq("recipe_id", recipe.id);

        if (delIngError) throw delIngError;

        const { error: delStepError } = await supabaseClient
          .from("recipe_steps")
          .delete()
          .eq("recipe_id", recipe.id);

        if (delStepError) throw delStepError;

        const ingredientRows = ingredients.map((content, idx) => ({
          recipe_id: recipe.id,
          content,
          sort_order: idx + 1
        }));

        const stepRows = steps.map((content, idx) => ({
          recipe_id: recipe.id,
          content,
          sort_order: idx + 1
        }));

        const { error: ingError } = await supabaseClient.from("recipe_ingredients").insert(ingredientRows);
        if (ingError) throw ingError;

        const { error: stepError } = await supabaseClient.from("recipe_steps").insert(stepRows);
        if (stepError) throw stepError;

        hideModal(editModal);
        await loadRecipes();
      } catch (e) {
        console.error(e);
        setError("editError", "수정 중 오류가 발생했습니다.\n\n" + (e?.message || ""));
      }
    }

    async function deleteMine(recipeId) {
      const recipe = getRecipeById(recipeId);
      if (!recipe || recipe.owner_device_id !== deviceId) {
        alert("삭제 권한이 없습니다.");
        return;
      }

      const ok = confirm("이 레시피를 삭제할까요?");
      if (!ok) return;

      try {
        await supabaseClient.from("saved_recipes").delete().eq("recipe_id", recipeId);
        await supabaseClient.from("reviews").delete().eq("recipe_id", recipeId);
        await supabaseClient.from("recipe_ingredients").delete().eq("recipe_id", recipeId);
        await supabaseClient.from("recipe_steps").delete().eq("recipe_id", recipeId);

        const { error } = await supabaseClient
          .from("recipes")
          .delete()
          .eq("id", recipeId)
          .eq("owner_device_id", deviceId);

        if (error) throw error;

        await loadRecipes();
      } catch (e) {
        console.error(e);
        alert("삭제 중 오류가 발생했습니다.");
      }
    }

    async function adminDeleteRecipe(recipeId) {
      const token = prompt("관리자 삭제 비밀번호를 입력하세요");
      if (!token) return;

      const ok = confirm("관리자 권한으로 이 레시피를 삭제할까요?");
      if (!ok) return;

      try {
        const response = await fetch("/api/admin-delete", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ recipeId, token })
        });

        const result = await response.json();

        if (!response.ok) {
          alert(result.error || "관리자 삭제 실패");
          return;
        }

        alert("관리자 삭제 완료");
        await loadRecipes();
      } catch (e) {
        console.error(e);
        alert("관리자 삭제 중 오류가 발생했습니다.");
      }
    }

    document.getElementById("openCreateBtn").addEventListener("click", () => {
      clearCreateForm();
      showModal(createModal);
    });

    document.getElementById("closeCreateBtn").addEventListener("click", () => hideModal(createModal));
    document.getElementById("submitCreateBtn").addEventListener("click", createRecipe);

    document.getElementById("closeEditBtn").addEventListener("click", () => hideModal(editModal));
    document.getElementById("submitEditBtn").addEventListener("click", saveEdit);

    document.getElementById("closeDetailBtn").addEventListener("click", () => hideModal(detailModal));
    document.getElementById("submitReviewBtn").addEventListener("click", submitReview);

    document.getElementById("addIngredientBtn").addEventListener("click", () => addDynamicField("ingredients"));
    document.getElementById("addStepBtn").addEventListener("click", () => addDynamicField("steps"));

    document.getElementById("editAddIngredientBtn").addEventListener("click", () => addDynamicField("editIngredients"));
    document.getElementById("editAddStepBtn").addEventListener("click", () => addDynamicField("editSteps"));

    document.getElementById("image").addEventListener("change", e => {
      const file = e.target.files[0];
      const preview = document.getElementById("preview");
      if (!file) {
        preview.src = "";
        preview.classList.remove("show");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        preview.src = reader.result;
        preview.classList.add("show");
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("editImage").addEventListener("change", e => {
      const file = e.target.files[0];
      const preview = document.getElementById("editPreview");
      if (!file) {
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        preview.src = reader.result;
        preview.classList.add("show");
      };
      reader.readAsDataURL(file);
    });

 

    listEl.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;

      const recipeId = Number(btn.dataset.id);
      const action = btn.dataset.action;

      if (action === "save") await toggleSave(recipeId);
      if (action === "detail") await openDetail(recipeId);
      if (action === "edit") openEdit(recipeId);
      if (action === "delete") await deleteMine(recipeId);
      if (action === "admin-delete") await adminDeleteRecipe(recipeId);
    });

    clearCreateForm();
    loadRecipes();
  </script>
</body>
</html>
